target-version = "py311"

# Enable rules by default (matching current code style)
lint.select = [
    "F",   # pyflakes — errors
    "E",   # pycodestyle — errors
    "W",   # pycodestyle — warnings
    "I",   # isort — import ordering
    "N",   # pep8-naming — naming conventions
    "UP",  # pyupgrade — modern syntax
    "B",   # flake8-bugbear — bug detection
    "SIM", # flake8-simplify — simplification
]

# Rules to explicitly avoid (codebase convention)
lint.ignore = [
    "E501",   # line too long — project already has long lines
    "N802",   # function name should be lowercase — allows legacy CamelCase
    "N803",   # argument name should be lowercase
    "N806",   # variable in function should be lowercase
    "SIM108", # use ternary operator — current style prefers if/else
]

# Import ordering
lint.isort.required-imports = ["from __future__ import annotations"]
lint.isort.combine-as-imports = true
lint.isort.known-first-party = ["sqlfy"]

# Allow computing  (flake8-use-pathlib)
lint.per-file-ignores."__init__.py" = ["F401"]

# Formatting
format.docstring-code-format = true
format.docstring-code-line-length = 88

[format]
line-ending = "lf"
