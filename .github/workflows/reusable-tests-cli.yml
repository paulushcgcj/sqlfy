name: Reusable CLI Tests

on:
  workflow_call:

permissions: {}

jobs:
  tests-cli:
    name: CLI Unit Tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group dev
        working-directory: cli

      - name: Generate contract schemas
        run: uv run python -m sqlfy.build.generate_contracts
        working-directory: cli

      - name: Run tests
        run: uv run pytest -v --tb=short --junit-xml=test-results.xml
        working-directory: cli

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cli-test-results-py${{ matrix.python-version }}
          path: cli/test-results.xml