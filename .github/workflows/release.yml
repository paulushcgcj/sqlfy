name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-13
            target: macos-x86_64
          - os: macos-latest
            target: macos-aarch64
          - os: windows-latest
            target: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen
        working-directory: cli

      - name: Build
        run: uv run pyinstaller --onefile --name sqlfy pyinstaller_entry.py
        working-directory: cli

      - name: Rename (Unix)
        if: runner.os != 'Windows'
        run: mv cli/dist/sqlfy cli/dist/sqlfy-${{ matrix.target }}

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        run: mv cli/dist/sqlfy.exe cli/dist/sqlfy-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: cli/dist/sqlfy*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
