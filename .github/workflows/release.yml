name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: sqlfy
            asset_name: sqlfy-macos-arm64.zip
          - os: ubuntu-latest
            artifact_name: sqlfy
            asset_name: sqlfy-linux-amd64.zip
          - os: windows-latest
            artifact_name: sqlfy.exe
            asset_name: sqlfy-windows-amd64.zip
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          cd cli
          uv sync
          uv pip install pyinstaller

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd cli
          uv run pyinstaller \
            --name sqlfy \
            --onefile \
            --console \
            --noconfirm \
            --clean \
            --collect-all sqlfy \
            --collect-all sqlglot \
            --hidden-import=sqlglot \
            --hidden-import=sqlglot.dialects.oracle \
            --hidden-import=networkx \
            pyinstaller_entry.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd cli
          uv run pyinstaller `
            --name sqlfy `
            --onefile `
            --console `
            --noconfirm `
            --clean `
            --collect-all sqlfy `
            --collect-all sqlglot `
            --hidden-import=sqlglot `
            --hidden-import=sqlglot.dialects.oracle `
            --hidden-import=networkx `
            pyinstaller_entry.py

      - name: Create release package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-package
          cp cli/dist/${{ matrix.artifact_name }} release-package/
          cp README.md release-package/
          cd release-package
          zip -r ../${{ matrix.asset_name }} .

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path release-package
          Copy-Item cli\dist\${{ matrix.artifact_name }} release-package\
          Copy-Item README.md release-package\
          Compress-Archive -Path release-package\* -DestinationPath ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## SQLfy v${{ steps.get_version.outputs.VERSION }}
            
            Schema Graph Engine — Parse Flyway migrations into knowledge graphs and LLM-ready context.
            
            ### 📦 Downloads
            
            Choose the right package for your platform:
            
            | Platform | File | Installation |
            |----------|------|--------------|
            | **macOS** (Apple Silicon) | `sqlfy-macos-arm64.zip` | `unzip sqlfy-macos-arm64.zip && chmod +x sqlfy && ./sqlfy --help` |
            | **Linux** (x86_64) | `sqlfy-linux-amd64.zip` | `unzip sqlfy-linux-amd64.zip && chmod +x sqlfy && ./sqlfy --help` |
            | **Windows** (x86_64) | `sqlfy-windows-amd64.zip` | `Expand-Archive sqlfy-windows-amd64.zip` then run `sqlfy.exe` |
            
            Each package includes:
            - Standalone binary (no Python required)
            - README.md documentation
            
            ### 🚀 Quick Start
            
            ```bash
            # Extract and run
            unzip sqlfy-*.zip
            ./sqlfy dump ./your-migrations --format summary
            ```
            
            ### 📝 Full documentation
            
            See [README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for complete command reference.
            
            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}
          files: |
            artifacts/sqlfy-macos-arm64.zip/sqlfy-macos-arm64.zip
            artifacts/sqlfy-linux-amd64.zip/sqlfy-linux-amd64.zip
            artifacts/sqlfy-windows-amd64.zip/sqlfy-windows-amd64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
