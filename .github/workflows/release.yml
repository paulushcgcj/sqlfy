# This is a template for automated GitHub Releases
# To use: Create .github/workflows/release.yml with this content
# Then: git tag v0.20.0 && git push origin v0.20.0

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheel
        run: |
          cd cli
          pip install build
          python -m build
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: cli/dist/*.whl

  build-binary-macos:
    name: Build binary (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build binary
        run: |
          cd cli
          pip install pyinstaller
          pyinstaller --onefile --name sqlfy src/sqlfy/main.py
          chmod +x dist/sqlfy
          tar -czf sqlfy-macos.tar.gz -C dist sqlfy
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: cli/sqlfy-macos.tar.gz

  build-binary-linux:
    name: Build binary (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build binary
        run: |
          cd cli
          pip install pyinstaller
          pyinstaller --onefile --name sqlfy src/sqlfy/main.py
          chmod +x dist/sqlfy
          tar -czf sqlfy-linux.tar.gz -C dist sqlfy
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: cli/sqlfy-linux.tar.gz

  build-tauri:
    name: Build Tauri app
    strategy:
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev
      - name: Build Tauri app
        run: |
          cd app
          npm install
          npm run tauri build
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: app/src-tauri/target/release/bundle/

  create-release:
    name: Create GitHub Release
    needs: [build-python, build-binary-macos, build-binary-linux, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            python-wheel/*.whl
            binary-macos/sqlfy-macos.tar.gz
            binary-linux/sqlfy-linux.tar.gz
            tauri-macos-latest/dmg/*.dmg
            tauri-ubuntu-latest/appimage/*.AppImage
            tauri-windows-latest/msi/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
