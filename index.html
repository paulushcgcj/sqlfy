<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schema Graph Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f9fafb;
      --color-bg-tertiary: #f3f4f6;
      --color-text-primary: #111827;
      --color-text-secondary: #4b5563;
      --color-text-tertiary: #9ca3af;
      --color-border-primary: rgba(0,0,0,0.4);
      --color-border-secondary: rgba(0,0,0,0.3);
      --color-border-tertiary: rgba(0,0,0,0.15);
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-mono: 'Courier New', Courier, monospace;
      --accent: #7c3aed;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #111827;
        --color-bg-secondary: #1f2937;
        --color-bg-tertiary: #0f172a;
        --color-text-primary: #f9fafb;
        --color-text-secondary: #9ca3af;
        --color-text-tertiary: #6b7280;
        --color-border-primary: rgba(255,255,255,0.4);
        --color-border-secondary: rgba(255,255,255,0.3);
        --color-border-tertiary: rgba(255,255,255,0.15);
      }
    }

    body {
      font-family: var(--font-mono);
      background: var(--color-bg-tertiary);
      color: var(--color-text-primary);
      font-size: 12px;
      height: 100vh;
      overflow: hidden;
    }

    .shell { display: flex; flex-direction: column; height: 100vh; min-height: 600px; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      background: var(--color-bg-secondary);
      border-bottom: 0.5px solid var(--color-border-secondary);
      flex-shrink: 0;
    }
    .topbar-title { font-weight: 500; font-size: 13px; color: var(--color-text-primary); }
    .topbar-sub   { font-size: 11px; color: var(--color-text-tertiary); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--color-bg-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 16px; border: none; background: none; cursor: pointer;
      font-family: inherit; font-size: 12px; color: var(--color-text-secondary);
      border-bottom: 2px solid transparent; transition: all .15s;
    }
    .tab:hover { color: var(--color-text-primary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.disabled { opacity: .35; cursor: not-allowed; }
    .parse-btn {
      margin-left: auto; padding: 5px 14px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 12px;
      font-family: inherit; font-weight: 500;
    }
    .parse-btn:hover { background: #6d28d9; }

    /* ── Layouts ── */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .panel   { flex: 1; overflow: auto; padding: 12px; }
    .split   { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px; flex-shrink: 0;
      border-right: 0.5px solid var(--color-border-tertiary);
      overflow-y: auto; padding: 8px 0;
      background: var(--color-bg-secondary);
    }
    .sbar-sect {
      font-size: 10px; color: var(--color-text-tertiary);
      padding: 10px 12px 4px; text-transform: uppercase; letter-spacing: .08em;
    }
    .sbar-item {
      display: block; width: 100%; text-align: left;
      padding: 6px 12px; border: none; background: none;
      cursor: pointer; font-family: inherit; font-size: 12px;
      color: var(--color-text-secondary); border-left: 2px solid transparent;
    }
    .sbar-item:hover { color: var(--color-text-primary); background: var(--color-bg-primary); }
    .sbar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,58,237,.06); }
    .sbar-item .sub { font-size: 10px; color: var(--color-text-tertiary); margin-top: 1px; }

    /* ── Migration editor ── */
    .file-block { margin-bottom: 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; overflow: hidden; }
    .file-hdr {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: var(--color-bg-secondary); border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .file-hdr input {
      flex: 1; background: none; border: none; outline: none;
      font-family: inherit; font-size: 12px; color: var(--color-text-primary);
    }
    .file-hdr .rm {
      background: none; border: none; cursor: pointer;
      color: var(--color-text-tertiary); font-size: 16px; line-height: 1; padding: 0 2px;
    }
    .file-hdr .rm:hover { color: var(--color-text-secondary); }
    .sql-area {
      width: 100%; border: none; outline: none; font-family: inherit; font-size: 11.5px;
      background: #0d1117; color: #a5f3fc; padding: 10px; resize: vertical; min-height: 120px; line-height: 1.6;
    }
    .add-btn {
      padding: 6px 14px; background: none;
      border: 1px dashed var(--color-border-secondary);
      border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--accent);
    }
    .add-btn:hover { background: rgba(124,58,237,.05); }
    .err-bar {
      padding: 6px 14px; background: rgba(220,38,38,.08);
      border-bottom: 0.5px solid rgba(220,38,38,.3);
      color: #dc2626; font-size: 11px;
    }

    /* ── Graph: table detail ── */
    .main { flex: 1; overflow: auto; }
    .tbl-hdr { padding: 16px 20px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .tbl-name { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
    .tbl-meta { font-size: 11px; color: var(--color-text-tertiary); margin-top: 3px; }
    .tbl-comment { font-size: 12px; color: var(--color-text-secondary); font-style: italic; margin-top: 4px; }
    .sect { padding: 12px 20px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .sect-title { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .col-row {
      display: grid; grid-template-columns: 140px 120px auto 100px 1fr;
      gap: 6px; padding: 4px 0;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      align-items: center; font-size: 11.5px;
    }
    .col-row:last-child { border-bottom: none; }
    .col-head { color: var(--color-text-tertiary); font-size: 10px; padding-bottom: 4px; }
    .col-name { color: var(--color-text-primary); }
    .col-type { color: #7dd3fc; }
    .badge {
      display: inline-block; font-size: 9px; padding: 1px 5px;
      border-radius: 3px; margin-right: 3px;
    }
    .badge.pk { background: rgba(124,58,237,.15); color: #7c3aed; border: 0.5px solid rgba(124,58,237,.3); }
    .badge.nn { background: rgba(220,38,38,.10); color: #dc2626; border: 0.5px solid rgba(220,38,38,.25); }
    .badge.uq { background: rgba(8,145,178,.10); color: #0891b2; border: 0.5px solid rgba(8,145,178,.25); }
    .badge.fk { background: rgba(217,119,6,.10); color: #d97706; border: 0.5px solid rgba(217,119,6,.25); }
    .col-def     { color: var(--color-text-tertiary); }
    .col-comment { color: var(--color-text-tertiary); font-style: italic; }
    .rel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rel-card { background: var(--color-bg-secondary); border-radius: 6px; padding: 10px 12px; border-left: 3px solid #d97706; }
    .rel-card.in { border-left-color: #0891b2; }
    .rel-card .rl  { font-size: 11.5px; color: var(--color-text-primary); }
    .rel-card .rm2 { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
    .idx-row {
      display: flex; align-items: center; gap: 8px; padding: 4px 0;
      font-size: 11.5px; border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .idx-row:last-child { border-bottom: none; }

    /* ── LLM chunk panel ── */
    .chunk-content {
      background: #0d1117; border: 0.5px solid var(--color-border-tertiary); border-radius: 6px;
      padding: 14px; color: #a5f3fc; white-space: pre-wrap;
      font-size: 11px; line-height: 1.7; margin-bottom: 12px;
    }
    .chunk-meta {
      background: var(--color-bg-secondary); border: 0.5px solid var(--color-border-tertiary);
      border-radius: 6px; padding: 14px; color: var(--color-text-secondary);
      white-space: pre-wrap; font-size: 11px; line-height: 1.6;
    }
    .chunk-hint {
      font-size: 11px; color: var(--color-text-tertiary); font-style: italic;
      margin-bottom: 10px; padding: 6px 10px;
      background: var(--color-bg-secondary); border-radius: 4px;
      border-left: 2px solid var(--accent);
    }
    .chunk-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px; border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .chunk-type-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      background: rgba(124,58,237,.12); color: var(--accent);
      border: 0.5px solid rgba(124,58,237,.3);
    }
    .copy-btn {
      margin-left: auto; padding: 4px 10px;
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 4px; cursor: pointer; font-size: 11px;
      color: var(--color-text-secondary); font-family: inherit;
    }
    .copy-btn:hover { color: var(--color-text-primary); }
    .copy-btn.ok    { color: #059669; }

    /* ── ERD ── */
    .erd-wrap {
      width: 100%; overflow: hidden;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      background: var(--color-bg-secondary);
    }
    .erd-wrap svg { display: block; width: 100%; }

    /* ── Export button ── */
    .export-btn {
      margin: 12px; padding: 6px 14px; background: none;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 6px; cursor: pointer; font-family: inherit;
      font-size: 12px; color: var(--color-text-secondary);
    }
    .export-btn:hover { color: var(--color-text-primary); }

    /* ── Empty state ── */
    .no-data {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--color-text-tertiary);
      font-size: 12px; flex-direction: column; gap: 8px;
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="8" stroke="#7c3aed" stroke-width="1.2"/>
      <circle cx="9" cy="9" r="4" fill="#7c3aed" opacity=".4"/>
      <circle cx="9" cy="9" r="1.5" fill="#7c3aed"/>
    </svg>
    <span class="topbar-title">Schema Graph Engine</span>
    <span class="topbar-sub">Flyway → AST → Vector Context</span>
  </div>

  <div class="tabs" id="tabbar">
    <button class="tab active" data-tab="migrations">① Migrations</button>
    <button class="tab disabled" data-tab="graph"  id="tab-graph">② Schema Graph</button>
    <button class="tab disabled" data-tab="llm"   id="tab-llm">③ LLM Chunks</button>
    <button class="parse-btn" id="parse-btn">▶ Parse →</button>
  </div>

  <div id="err-bar" style="display:none" class="err-bar"></div>

  <div class="content">
    <div id="pane-migrations" class="panel"></div>
    <div id="pane-graph"      class="split" style="display:none"></div>
    <div id="pane-llm"        class="split" style="display:none"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   SAMPLE DATA
═══════════════════════════════════════════════ */
const SAMPLES = [
  {
    filename: "V1__create_core_tables.sql",
    sql: `-- Core user and product tables
CREATE TABLE app.users (
    user_id     NUMBER(10)      NOT NULL,
    username    VARCHAR2(50)    NOT NULL,
    email       VARCHAR2(100)   NOT NULL,
    status      VARCHAR2(20)    DEFAULT 'ACTIVE' NOT NULL,
    created_at  TIMESTAMP       DEFAULT SYSTIMESTAMP NOT NULL,
    CONSTRAINT pk_users PRIMARY KEY (user_id),
    CONSTRAINT uq_users_email UNIQUE (email),
    CONSTRAINT ck_users_status CHECK (status IN ('ACTIVE','INACTIVE','SUSPENDED'))
);
CREATE SEQUENCE app.seq_users START WITH 1 INCREMENT BY 1 NOCACHE NOCYCLE;
CREATE TABLE app.products (
    product_id  NUMBER(10)      NOT NULL,
    name        VARCHAR2(200)   NOT NULL,
    description CLOB,
    price       NUMBER(10,2)    NOT NULL,
    stock_qty   NUMBER(10)      DEFAULT 0 NOT NULL,
    category    VARCHAR2(50),
    CONSTRAINT pk_products PRIMARY KEY (product_id),
    CONSTRAINT ck_products_price CHECK (price >= 0)
);
CREATE SEQUENCE app.seq_products START WITH 1 INCREMENT BY 1 NOCACHE;
COMMENT ON TABLE app.users IS 'Core user accounts';
COMMENT ON COLUMN app.users.status IS 'Account lifecycle status';`
  },
  {
    filename: "V2__create_orders.sql",
    sql: `-- Order management
CREATE TABLE app.orders (
    order_id        NUMBER(10)      NOT NULL,
    user_id         NUMBER(10)      NOT NULL,
    total_amount    NUMBER(12,2)    NOT NULL,
    status          VARCHAR2(20)    DEFAULT 'PENDING' NOT NULL,
    shipping_addr   VARCHAR2(500),
    created_at      TIMESTAMP       DEFAULT SYSTIMESTAMP NOT NULL,
    completed_at    TIMESTAMP,
    CONSTRAINT pk_orders PRIMARY KEY (order_id),
    CONSTRAINT fk_orders_user FOREIGN KEY (user_id)
        REFERENCES app.users(user_id) ON DELETE CASCADE,
    CONSTRAINT ck_orders_status CHECK (status IN ('PENDING','PROCESSING','SHIPPED','DELIVERED','CANCELLED'))
);
CREATE SEQUENCE app.seq_orders START WITH 1000 INCREMENT BY 1 NOCACHE;
CREATE TABLE app.order_items (
    item_id     NUMBER(10)   NOT NULL,
    order_id    NUMBER(10)   NOT NULL,
    product_id  NUMBER(10)   NOT NULL,
    quantity    NUMBER(5)    NOT NULL,
    unit_price  NUMBER(10,2) NOT NULL,
    CONSTRAINT pk_order_items PRIMARY KEY (item_id),
    CONSTRAINT fk_items_order FOREIGN KEY (order_id)
        REFERENCES app.orders(order_id) ON DELETE CASCADE,
    CONSTRAINT fk_items_product FOREIGN KEY (product_id)
        REFERENCES app.products(product_id),
    CONSTRAINT ck_items_qty CHECK (quantity > 0)
);
CREATE INDEX app.idx_orders_user ON app.orders(user_id);
CREATE INDEX app.idx_orders_status ON app.orders(status, created_at);
CREATE INDEX app.idx_items_order ON app.order_items(order_id);`
  },
  {
    filename: "V3__add_audit.sql",
    sql: `-- Audit trail
CREATE TABLE app.audit_log (
    log_id      NUMBER(15)      NOT NULL,
    table_name  VARCHAR2(100)   NOT NULL,
    record_id   NUMBER(15)      NOT NULL,
    action      VARCHAR2(10)    NOT NULL,
    changed_by  NUMBER(10),
    changed_at  TIMESTAMP       DEFAULT SYSTIMESTAMP NOT NULL,
    old_values  CLOB,
    new_values  CLOB,
    CONSTRAINT pk_audit_log PRIMARY KEY (log_id),
    CONSTRAINT fk_audit_user FOREIGN KEY (changed_by)
        REFERENCES app.users(user_id),
    CONSTRAINT ck_audit_action CHECK (action IN ('INSERT','UPDATE','DELETE'))
);
CREATE SEQUENCE app.seq_audit START WITH 1 INCREMENT BY 1 CACHE 100;
ALTER TABLE app.users ADD (last_login TIMESTAMP, login_count NUMBER(10) DEFAULT 0);
ALTER TABLE app.products ADD CONSTRAINT uq_products_name UNIQUE (name);
CREATE INDEX app.idx_audit_table ON app.audit_log(table_name, record_id);
CREATE INDEX app.idx_audit_user ON app.audit_log(changed_by, changed_at);`
  }
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let files      = SAMPLES.map(s => ({ ...s }));
let graph      = null;
let chunks     = null;
let activeTab  = 'migrations';
let selTable   = null;
let selChunk   = null;

/* ═══════════════════════════════════════════════
   SQL PARSER UTILITIES
═══════════════════════════════════════════════ */
function stripComments(sql) {
  sql = sql.replace(/\/\*[\s\S]*?\*\//g, ' ');
  sql = sql.replace(/--[^\n]*/g, ' ');
  return sql;
}

function splitStmts(sql) {
  const r = []; let depth = 0, cur = '', inStr = false;
  for (let i = 0; i < sql.length; i++) {
    const c = sql[i];
    if (inStr) {
      cur += c;
      if (c === "'") { if (sql[i + 1] === "'") cur += sql[++i]; else inStr = false; }
    } else if (c === "'") { inStr = true; cur += c; }
    else if (c === '(')  { depth++; cur += c; }
    else if (c === ')')  { depth--; cur += c; }
    else if (c === ';' && depth === 0) { const s = cur.trim(); if (s) r.push(s); cur = ''; }
    else cur += c;
  }
  const s = cur.trim(); if (s) r.push(s); return r;
}

function extractParen(str) {
  const start = str.indexOf('('); if (start < 0) return '';
  let d = 0;
  for (let i = start; i < str.length; i++) {
    if (str[i] === '(') d++; else if (str[i] === ')') if (--d === 0) return str.slice(start + 1, i);
  }
  return '';
}

function splitComma(str) {
  const r = []; let d = 0, cur = '', inStr = false;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (inStr) { cur += c; if (c === "'") inStr = false; }
    else if (c === "'") { inStr = true; cur += c; }
    else if (c === '(') { d++; cur += c; }
    else if (c === ')') { d--; cur += c; }
    else if (c === ',' && d === 0) { const p = cur.trim(); if (p) r.push(p); cur = ''; }
    else cur += c;
  }
  const p = cur.trim(); if (p) r.push(p); return r;
}

function parseName(str) {
  str = str.trim().replace(/"/g, '');
  const p = str.split('.');
  if (p.length >= 2) return { schema: p[0].toUpperCase(), name: p[1].toUpperCase(), full: `${p[0].toUpperCase()}.${p[1].toUpperCase()}` };
  return { schema: null, name: str.toUpperCase(), full: str.toUpperCase() };
}

function parseDataType(s) {
  const m = s.match(/^([A-Z][A-Z0-9 ]*)(?:\(([^)]+)\))?$/i);
  if (!m) return { type: s.trim().toUpperCase(), precision: null, scale: null };
  const type = m[1].trim().toUpperCase();
  if (!m[2]) return { type, precision: null, scale: null };
  const a = m[2].split(',').map(x => x.trim());
  return { type, precision: a[0] ? parseInt(a[0]) : null, scale: a[1] ? parseInt(a[1]) : null };
}

function typeStr(col) {
  if (col.precision !== null && col.scale !== null) return `${col.type}(${col.precision},${col.scale})`;
  if (col.precision !== null) return `${col.type}(${col.precision})`;
  return col.type;
}

function parseColDef(def) {
  def = def.replace(/\s+/g, ' ').trim();
  const nm = def.match(/^"?(\w+)"?\s+/); if (!nm) return null;
  const name = nm[1].toUpperCase();
  let rest = def.slice(nm[0].length).trim();
  let typeS = '', d = 0, i = 0;
  for (; i < rest.length; i++) {
    const c = rest[i];
    if (c === '(') d++; else if (c === ')') d--;
    else if (c === ' ' && d === 0) break;
    typeS += c;
  }
  const { type, precision, scale } = parseDataType(typeS);
  rest = rest.slice(i).trim();
  let nullable = true, defVal = null, primaryKey = false, unique = false, references = null;
  const dm = rest.match(/DEFAULT\s+(.+?)(?=\s+(?:NOT\s+NULL|NULL|CONSTRAINT|PRIMARY|UNIQUE|REFERENCES|ENABLE|DISABLE)|$)/i);
  if (dm) { defVal = dm[1].trim(); rest = rest.replace(dm[0], ' ').trim(); }
  if (/NOT\s+NULL/i.test(rest)) nullable = false;
  if (/\bPRIMARY\s+KEY\b/i.test(rest)) primaryKey = true;
  if (/\bUNIQUE\b/i.test(rest)) unique = true;
  const rm = rest.match(/REFERENCES\s+"?(\w+(?:\.\w+)?)"?\s*\("?(\w+)"?\)/i);
  if (rm) { const rn = parseName(rm[1]); references = { table: rn.full, column: rm[2].toUpperCase() }; }
  return { name, type, precision, scale, nullable, default: defVal, primaryKey, unique, references };
}

function parseConstraint(def) {
  def = def.replace(/\s+/g, ' ').trim();
  let cname = null;
  const cn = def.match(/^CONSTRAINT\s+"?(\w+)"?\s+/i);
  if (cn) { cname = cn[1].toUpperCase(); def = def.slice(cn[0].length).trim(); }
  if (/^PRIMARY\s+KEY/i.test(def)) {
    const cols = extractParen(def).split(',').map(c => c.trim().replace(/"/g, '').toUpperCase()).filter(Boolean);
    return { name: cname, type: 'primary_key', columns: cols };
  }
  if (/^UNIQUE/i.test(def)) {
    const cols = extractParen(def).split(',').map(c => c.trim().replace(/"/g, '').toUpperCase()).filter(Boolean);
    return { name: cname, type: 'unique', columns: cols };
  }
  if (/^FOREIGN\s+KEY/i.test(def)) {
    const fromCols = extractParen(def).split(',').map(c => c.trim().replace(/"/g, '').toUpperCase()).filter(Boolean);
    const rm = def.match(/REFERENCES\s+"?(\w+(?:\.\w+)?)"?\s*\(([^)]+)\)/i);
    let toTable = '', toCols = [];
    if (rm) { toTable = parseName(rm[1]).full; toCols = rm[2].split(',').map(c => c.trim().replace(/"/g, '').toUpperCase()); }
    const od = def.match(/ON\s+DELETE\s+(CASCADE|SET\s+NULL|SET\s+DEFAULT|RESTRICT|NO\s+ACTION)/i);
    return { name: cname, type: 'foreign_key', columns: fromCols, references: { table: toTable, columns: toCols, onDelete: od ? od[1].toUpperCase().replace(/\s+/, '_') : null } };
  }
  if (/^CHECK/i.test(def)) {
    return { name: cname, type: 'check', columns: [], checkExpr: extractParen(def) };
  }
  return null;
}

/* ═══════════════════════════════════════════════
   DDL HANDLERS
═══════════════════════════════════════════════ */
function handleCreateTable(stmt, version, tables) {
  const hm = stmt.match(/^CREATE\s+TABLE\s+"?(\w+(?:\.\w+)?)"?\s*\(/i); if (!hm) return;
  const qn = parseName(hm[1]);
  const body = extractParen(stmt); if (!body) return;
  const defs = splitComma(body);
  const columns = [], constraints = [];
  for (const d of defs) {
    const dt = d.trim(); if (!dt) continue;
    if (/^(CONSTRAINT\s+\w+\s+)?(PRIMARY\s+KEY|FOREIGN\s+KEY|UNIQUE|CHECK)/i.test(dt)) {
      const c = parseConstraint(dt); if (c) constraints.push(c);
    } else {
      const col = parseColDef(dt);
      if (col) {
        if (col.primaryKey) constraints.push({ name: `PK_${qn.name}`, type: 'primary_key', columns: [col.name] });
        if (col.references) constraints.push({ name: null, type: 'foreign_key', columns: [col.name], references: { table: col.references.table, columns: [col.references.column], onDelete: null } });
        columns.push(col);
      }
    }
  }
  tables.set(qn.full, {
    id: qn.full, schema: qn.schema, name: qn.name, full: qn.full,
    columns, constraints, indexes: [], comments: {},
    createdIn: version, modifiedIn: []
  });
}

function handleAlterTable(stmt, version, tables) {
  const tm = stmt.match(/^ALTER\s+TABLE\s+"?(\w+(?:\.\w+)?)"?\s+/i); if (!tm) return;
  const qn = parseName(tm[1]); const key = qn.full; const table = tables.get(key);
  const rest = stmt.slice(tm[0].length).trim();
  if (/^ADD\s+CONSTRAINT/i.test(rest)) {
    const c = parseConstraint(rest.replace(/^ADD\s+/i, '').trim());
    if (c && table) { table.constraints.push(c); if (!table.modifiedIn.includes(version)) table.modifiedIn.push(version); }
    return;
  }
  if (/^ADD\s*\(/i.test(rest)) {
    const body = extractParen(rest.slice(3));
    const defs = splitComma(body);
    for (const d of defs) { const col = parseColDef(d.trim()); if (col && table) { table.columns.push(col); if (!table.modifiedIn.includes(version)) table.modifiedIn.push(version); } }
    return;
  }
  const asc = rest.match(/^ADD\s+(\w)/i);
  if (asc) { const col = parseColDef(rest.slice(4).trim()); if (col && table) { table.columns.push(col); if (!table.modifiedIn.includes(version)) table.modifiedIn.push(version); } }
}

function handleCreateIndex(stmt, version, tables) {
  const m = stmt.match(/^CREATE\s+(UNIQUE\s+)?INDEX\s+"?(\w+(?:\.\w+)?)"?\s+ON\s+"?(\w+(?:\.\w+)?)"?\s*\(([^)]+)\)/i);
  if (!m) return;
  const unique = !!m[1]; const idxN = parseName(m[2]); const tblN = parseName(m[3]);
  const cols = m[4].split(',').map(c => c.trim().replace(/\s+(ASC|DESC)$/i, '').replace(/"/g, '').toUpperCase());
  const t = tables.get(tblN.full); if (t) t.indexes.push({ name: idxN.name, columns: cols, unique, createdIn: version });
}

function handleCreateSeq(stmt, version, seqs) {
  const m = stmt.match(/^CREATE\s+SEQUENCE\s+"?(\w+(?:\.\w+)?)"?/i); if (!m) return;
  const qn = parseName(m[1]);
  const sw = stmt.match(/START\s+WITH\s+(\d+)/i);
  const ib = stmt.match(/INCREMENT\s+BY\s+(\d+)/i);
  seqs.set(qn.full, { name: qn.name, schema: qn.schema, full: qn.full, startWith: sw ? parseInt(sw[1]) : 1, incrementBy: ib ? parseInt(ib[1]) : 1, createdIn: version });
}

function handleComment(stmt, tables) {
  const tm = stmt.match(/COMMENT\s+ON\s+TABLE\s+"?(\w+(?:\.\w+)?)"?\s+IS\s+'([^']*)'/i);
  if (tm) { const t = tables.get(parseName(tm[1]).full); if (t) t.comments['__table__'] = tm[2]; return; }
  const cm = stmt.match(/COMMENT\s+ON\s+COLUMN\s+"?(\w+(?:\.\w+)?)\.(\w+)"?\s+IS\s+'([^']*)'/i);
  if (cm) { const t = tables.get(parseName(cm[1]).full); if (t) t.comments[cm[2].toUpperCase()] = cm[3]; }
}

/* ═══════════════════════════════════════════════
   FLYWAY ORCHESTRATOR
═══════════════════════════════════════════════ */
function parseFlywayVer(fn) {
  const m = fn.match(/^V([\d.]+)__(.+?)\.sql$/i);
  if (!m) return { version: '0', description: fn, order: 0 };
  const parts = m[1].split('.').map(Number);
  const order = parts.reduce((a, n, i) => a + n * Math.pow(1000, 3 - i), 0);
  return { version: m[1], description: m[2].replace(/_/g, ' '), order };
}

function applyMigrations(flist) {
  const sorted = [...flist].map(f => ({ ...f, ...parseFlywayVer(f.filename) })).sort((a, b) => a.order - b.order);
  const tables = new Map(), seqs = new Map(), migHist = [];
  for (const file of sorted) {
    migHist.push({ version: file.version, description: file.description });
    const clean = stripComments(file.sql);
    const stmts = splitStmts(clean);
    for (const stmt of stmts) {
      const u = stmt.replace(/\s+/g, ' ').trim(); if (!u) continue;
      const up = u.toUpperCase();
      if      (up.startsWith('CREATE TABLE'))  handleCreateTable(stmt, file.version, tables);
      else if (up.startsWith('ALTER TABLE'))   handleAlterTable(stmt, file.version, tables);
      else if (up.startsWith('CREATE INDEX') || up.startsWith('CREATE UNIQUE INDEX')) handleCreateIndex(stmt, file.version, tables);
      else if (up.startsWith('CREATE SEQUENCE')) handleCreateSeq(stmt, file.version, seqs);
      else if (up.startsWith('COMMENT ON'))    handleComment(stmt, tables);
    }
  }
  const edges = [];
  for (const [, t] of tables) {
    for (const c of t.constraints) {
      if (c.type === 'foreign_key' && c.references) {
        edges.push({ id: `${t.full}→${c.references.table}:${c.name}`, fromTable: t.full, fromCols: c.columns, toTable: c.references.table, toCols: c.references.columns, constraintName: c.name, onDelete: c.references.onDelete });
      }
    }
  }
  return { tables, seqs, edges, migHist };
}

/* ═══════════════════════════════════════════════
   VECTOR CHUNK BUILDER
═══════════════════════════════════════════════ */
function buildChunks(g) {
  const { tables, seqs, edges, migHist } = g;
  const chunks = [];

  for (const [, t] of tables) {
    const pk   = t.constraints.find(c => c.type === 'primary_key');
    const fks  = t.constraints.filter(c => c.type === 'foreign_key');
    const uqs  = t.constraints.filter(c => c.type === 'unique');
    const cks  = t.constraints.filter(c => c.type === 'check');
    const outE = edges.filter(e => e.fromTable === t.full);
    const inE  = edges.filter(e => e.toTable   === t.full);
    const L = [];
    L.push(`TABLE: ${t.full}`);
    if (t.comments['__table__']) L.push(`Description: ${t.comments['__table__']}`);
    L.push(`Schema: ${t.schema || 'default'} | Created: V${t.createdIn}${t.modifiedIn.length ? ` | Modified: V${t.modifiedIn.join(', V')}` : ''}`);
    L.push(''); L.push('COLUMNS:');
    for (const col of t.columns) {
      const flags = [];
      if (pk?.columns.includes(col.name))             flags.push('PK');
      if (!col.nullable)                              flags.push('NOT NULL');
      if (col.default)                                flags.push(`DEFAULT ${col.default}`);
      if (uqs.some(u => u.columns.includes(col.name))) flags.push('UNIQUE');
      if (outE.some(e => e.fromCols.includes(col.name))) flags.push('FK');
      const comment = t.comments[col.name];
      L.push(`  ${col.name}: ${typeStr(col)}${flags.length ? ` [${flags.join(', ')}]` : ''}${comment ? ` -- ${comment}` : ''}`);
    }
    if (outE.length) { L.push(''); L.push('REFERENCES (outgoing FK):'); for (const e of outE) L.push(`  ${e.fromCols.join(',')}) → ${e.toTable}(${e.toCols.join(',')})${e.onDelete ? ` ON DELETE ${e.onDelete}` : ''}${e.constraintName ? ` [${e.constraintName}]` : ''}`); }
    if (inE.length)  { L.push(''); L.push('REFERENCED BY:'); for (const e of inE) L.push(`  ${e.fromTable}.${e.fromCols.join(',')} → ${e.toCols.join(',')}`); }
    if (t.indexes.length)  { L.push(''); L.push('INDEXES:');  for (const idx of t.indexes) L.push(`  ${idx.name}: (${idx.columns.join(', ')})${idx.unique ? ' UNIQUE' : ''} [V${idx.createdIn}]`); }
    if (cks.length)        { L.push(''); L.push('CHECK CONSTRAINTS:'); for (const ck of cks) L.push(`  ${ck.name || 'unnamed'}: CHECK (${ck.checkExpr})`); }
    chunks.push({
      id: `table:${t.full}`, type: 'table', title: `Table: ${t.name}`,
      content: L.join('\n'),
      meta: { tableName: t.name, schema: t.schema, columnCount: t.columns.length, hasPK: !!pk, fkCount: fks.length, referencedBy: inE.length, indexCount: t.indexes.length, createdIn: t.createdIn, pkCols: pk?.columns || [] },
      hint: `Use for: queries about ${t.name} table — columns, types, constraints, FK relationships.`
    });
  }

  const tableNames = [...tables.keys()];
  const totalCols  = [...tables.values()].reduce((s, t) => s + t.columns.length, 0);
  const schemas    = [...new Set([...tables.values()].map(t => t.schema).filter(Boolean))];

  const sumL = [
    'SCHEMA SUMMARY',
    `DB Schemas: ${schemas.join(', ')}`,
    `Tables: ${tableNames.length} (${tableNames.join(', ')})`,
    `Sequences: ${seqs.size} (${[...seqs.keys()].join(', ')})`,
    `Total columns: ${totalCols}`,
    `FK relationships: ${edges.length}`,
    `Migration history: ${migHist.map(m => `V${m.version} (${m.description})`).join(' → ')}`,
    ``, `RELATIONSHIP MAP:`,
    ...edges.map(e => `  ${e.fromTable}.${e.fromCols.join(',')} → ${e.toTable}.${e.toCols.join(',')}`),
    ``, `TABLE ROLES:`,
    ...[...tables.values()].map(t => {
      const o = edges.filter(e => e.fromTable === t.full).length;
      const i = edges.filter(e => e.toTable   === t.full).length;
      let role = 'standalone';
      if (i > 0 && o === 0) role = 'root/parent entity';
      else if (o > 0 && i > 0) role = 'junction/child entity';
      else if (o > 0 && i === 0) role = 'leaf/detail entity';
      return `  ${t.full}: ${role} (referenced by ${i}, references ${o})`;
    })
  ];
  chunks.unshift({ id: 'schema:summary', type: 'schema_summary', title: 'Schema Summary', content: sumL.join('\n'), meta: { tableCount: tables.size, seqCount: seqs.size, edgeCount: edges.length, columnCount: totalCols, schemas }, hint: 'Use for: high-level schema questions, table count, migration history, overall topology.' });

  const relL = ['RELATIONSHIP GRAPH (adjacency list)', ''];
  for (const tname of tableNames) {
    const out = edges.filter(e => e.fromTable === tname);
    const inn = edges.filter(e => e.toTable   === tname);
    relL.push(`${tname}:`);
    for (const e of out) relL.push(`  ──FK──▶ ${e.toTable} via ${e.fromCols.join(',')}${e.onDelete ? ` [ON DELETE ${e.onDelete}]` : ''}`);
    for (const e of inn) relL.push(`  ◀──FK── ${e.fromTable} via ${e.fromCols.join(',')}`);
    if (!out.length && !inn.length) relL.push('  (no FK relationships)');
  }
  chunks.push({ id: 'schema:relationships', type: 'relationship_map', title: 'Relationship Graph', content: relL.join('\n'), meta: { edges: edges.map(e => ({ from: e.fromTable, to: e.toTable, via: e.fromCols, onDelete: e.onDelete })) }, hint: 'Use for: JOIN path planning, cascade analysis, understanding table connectivity.' });

  return chunks;
}

/* ═══════════════════════════════════════════════
   ERD LAYOUT
═══════════════════════════════════════════════ */
function computeLayout(tables, edges) {
  const levels = new Map();
  for (const k of tables.keys()) levels.set(k, 0);
  for (let i = 0; i < 10; i++) {
    let ch = false;
    for (const e of edges) {
      const fl = levels.get(e.fromTable) || 0, tl = levels.get(e.toTable) || 0;
      if (fl <= tl) { levels.set(e.fromTable, tl + 1); ch = true; }
    }
    if (!ch) break;
  }
  const byLevel = new Map();
  for (const [t, l] of levels) { if (!byLevel.has(l)) byLevel.set(l, []); byLevel.get(l).push(t); }
  const pos = new Map(); const W = 580, H = 220; const maxL = Math.max(...levels.values());
  for (const [level, tbls] of byLevel) {
    const y = maxL === 0 ? H / 2 : (level / maxL) * (H - 80) + 40;
    tbls.forEach((t, i) => { const x = ((i + 1) / (tbls.length + 1)) * W; pos.set(t, { x, y }); });
  }
  return pos;
}

/* ═══════════════════════════════════════════════
   RENDER: MIGRATIONS TAB
═══════════════════════════════════════════════ */
function renderMigrations() {
  const pane = document.getElementById('pane-migrations');
  pane.innerHTML = '';
  files.forEach((file, i) => {
    const block = document.createElement('div'); block.className = 'file-block';
    block.innerHTML = `
      <div class="file-hdr">
        <span style="color:var(--accent);font-size:11px">V</span>
        <input value="${escH(file.filename)}" data-i="${i}" data-f="filename" />
        <button class="rm" data-rm="${i}">×</button>
      </div>
      <textarea class="sql-area" rows="10" data-i="${i}" data-f="sql">${escH(file.sql)}</textarea>
    `;
    pane.appendChild(block);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+ Add Migration File';
  addBtn.addEventListener('click', () => {
    files.push({ filename: `V${files.length + 1}__new_migration.sql`, sql: '-- Add your SQL here\n' });
    renderMigrations();
  });
  pane.appendChild(addBtn);
  pane.querySelectorAll('input[data-f],textarea[data-f]').forEach(el => {
    el.addEventListener('input', () => { files[parseInt(el.dataset.i)][el.dataset.f] = el.value; });
  });
  pane.querySelectorAll('[data-rm]').forEach(btn => {
    btn.addEventListener('click', () => { files.splice(parseInt(btn.dataset.rm), 1); renderMigrations(); });
  });
}

/* ═══════════════════════════════════════════════
   RENDER: GRAPH TAB
═══════════════════════════════════════════════ */
function renderGraph() {
  const pane = document.getElementById('pane-graph'); pane.innerHTML = '';
  const { tables, edges } = graph;

  /* — sidebar — */
  const sb = document.createElement('div'); sb.className = 'sidebar';
  const tlist = document.createElement('div');
  const ssect = document.createElement('div'); ssect.className = 'sbar-sect'; ssect.textContent = `Tables (${tables.size})`; tlist.appendChild(ssect);
  for (const [key, t] of tables) {
    const out = edges.filter(e => e.fromTable === key).length;
    const inn = edges.filter(e => e.toTable   === key).length;
    const btn = document.createElement('button'); btn.className = 'sbar-item' + (key === selTable ? ' active' : '');
    btn.innerHTML = `${escH(t.name)}<div class="sub">${t.columns.length} cols · ${out + inn} rels · V${t.createdIn}</div>`;
    btn.addEventListener('click', () => { selTable = key; renderGraph(); });
    tlist.appendChild(btn);
  }
  if (graph.seqs.size > 0) {
    const ssect2 = document.createElement('div'); ssect2.className = 'sbar-sect'; ssect2.textContent = `Sequences (${graph.seqs.size})`; tlist.appendChild(ssect2);
    for (const [, s] of graph.seqs) {
      const d = document.createElement('div'); d.className = 'sbar-item'; d.style.cursor = 'default';
      d.innerHTML = `${escH(s.name)}<div class="sub">START ${s.startWith} INC ${s.incrementBy}</div>`; tlist.appendChild(d);
    }
  }
  sb.appendChild(tlist); pane.appendChild(sb);

  /* — main area — */
  const main = document.createElement('div'); main.className = 'main';
  const pos = computeLayout(tables, edges);
  const BW = 130, BH = 48, SVW = 580, SVH = 240;
  const erdWrap = document.createElement('div'); erdWrap.className = 'erd-wrap';
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${SVW} ${SVH}`); svg.style.height = '240px';

  /* arrow marker */
  const defs = document.createElementNS(svgNS, 'defs');
  const marker = document.createElementNS(svgNS, 'marker');
  marker.setAttribute('id', 'arr'); marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '8');
  marker.setAttribute('refX', '6'); marker.setAttribute('refY', '3'); marker.setAttribute('orient', 'auto');
  const poly = document.createElementNS(svgNS, 'polygon'); poly.setAttribute('points', '0 0, 6 3, 0 6'); poly.setAttribute('fill', '#d97706');
  marker.appendChild(poly); defs.appendChild(marker); svg.appendChild(defs);

  /* edges */
  for (const e of edges) {
    const fp = pos.get(e.fromTable), tp = pos.get(e.toTable); if (!fp || !tp) continue;
    const x1 = fp.x, y1 = fp.y + BH / 2, x2 = tp.x, y2 = tp.y - BH / 2;
    const mid = (y1 + y2) / 2;
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${mid} ${x2} ${mid} ${x2} ${y2}`);
    path.setAttribute('stroke', '#d97706'); path.setAttribute('stroke-width', '1.2');
    path.setAttribute('fill', 'none'); path.setAttribute('opacity', '0.6'); path.setAttribute('marker-end', 'url(#arr)');
    svg.appendChild(path);
  }

  /* nodes */
  const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  for (const [key, t] of tables) {
    const p = pos.get(key); if (!p) continue;
    const isSel = key === selTable;
    const g = document.createElementNS(svgNS, 'g'); g.style.cursor = 'pointer';
    g.addEventListener('click', () => { selTable = key; renderGraph(); });
    const rect = document.createElementNS(svgNS, 'rect');
    rect.setAttribute('x', p.x - BW / 2); rect.setAttribute('y', p.y - BH / 2);
    rect.setAttribute('width', BW); rect.setAttribute('height', BH); rect.setAttribute('rx', '5');
    rect.setAttribute('fill',   isSel ? (isDark ? '#3c2f6b' : '#ede9fe') : (isDark ? '#1e2235' : '#f8f7ff'));
    rect.setAttribute('stroke', isSel ? '#7c3aed' : (isDark ? '#2d3748' : '#d1d5db'));
    rect.setAttribute('stroke-width', isSel ? '1.8' : '0.8');
    g.appendChild(rect);
    const txt1 = document.createElementNS(svgNS, 'text');
    txt1.setAttribute('x', p.x); txt1.setAttribute('y', p.y - 4); txt1.setAttribute('text-anchor', 'middle');
    txt1.setAttribute('font-size', '11'); txt1.setAttribute('font-weight', '500');
    txt1.setAttribute('fill', isSel ? '#7c3aed' : (isDark ? '#e2e8f0' : '#111827')); txt1.textContent = t.name;
    g.appendChild(txt1);
    const txt2 = document.createElementNS(svgNS, 'text');
    txt2.setAttribute('x', p.x); txt2.setAttribute('y', p.y + 11); txt2.setAttribute('text-anchor', 'middle');
    txt2.setAttribute('font-size', '9'); txt2.setAttribute('fill', isDark ? '#64748b' : '#9ca3af');
    txt2.textContent = `${t.columns.length} cols · V${t.createdIn}`;
    g.appendChild(txt2);
    svg.appendChild(g);
  }
  erdWrap.appendChild(svg); main.appendChild(erdWrap);

  /* — table detail — */
  if (selTable && tables.get(selTable)) {
    const t   = tables.get(selTable);
    const pk  = t.constraints.find(c => c.type === 'primary_key');
    const uqs = t.constraints.filter(c => c.type === 'unique');
    const cks = t.constraints.filter(c => c.type === 'check');
    const outE = edges.filter(e => e.fromTable === selTable);
    const inE  = edges.filter(e => e.toTable   === selTable);
    const detail = document.createElement('div');

    /* header */
    const hdr = document.createElement('div'); hdr.className = 'tbl-hdr';
    hdr.innerHTML = `
      <div class="tbl-name">${escH(t.full)}</div>
      <div class="tbl-meta">V${t.createdIn}${t.modifiedIn.length ? ` · modified V${t.modifiedIn.join(', ')}` : ''} · ${t.columns.length} columns${t.indexes.length ? ` · ${t.indexes.length} indexes` : ''}</div>
      ${t.comments['__table__'] ? `<div class="tbl-comment">${escH(t.comments['__table__'])}</div>` : ''}
    `;
    detail.appendChild(hdr);

    /* columns */
    const colSect = document.createElement('div'); colSect.className = 'sect';
    colSect.innerHTML = `<div class="sect-title">Columns</div><div class="col-row col-head"><span>Column</span><span>Type</span><span>Flags</span><span>Default</span><span>Comment</span></div>`;
    for (const col of t.columns) {
      const row = document.createElement('div'); row.className = 'col-row';
      const badges = [];
      if (pk?.columns.includes(col.name))               badges.push('<span class="badge pk">PK</span>');
      if (!col.nullable)                                badges.push('<span class="badge nn">NN</span>');
      if (uqs.some(u => u.columns.includes(col.name)))  badges.push('<span class="badge uq">UQ</span>');
      if (outE.some(e => e.fromCols.includes(col.name))) badges.push('<span class="badge fk">FK</span>');
      row.innerHTML = `<span class="col-name">${escH(col.name)}</span><span class="col-type">${escH(typeStr(col))}</span><span>${badges.join('')}</span><span class="col-def">${col.default ? escH(col.default) : '—'}</span><span class="col-comment">${t.comments[col.name] ? escH(t.comments[col.name]) : ''}</span>`;
      colSect.appendChild(row);
    }
    detail.appendChild(colSect);

    /* relationships */
    if (outE.length || inE.length) {
      const relSect = document.createElement('div'); relSect.className = 'sect';
      relSect.innerHTML = '<div class="sect-title">Relationships</div><div class="rel-grid"></div>';
      const rg = relSect.querySelector('.rel-grid');
      if (outE.length) { const d = document.createElement('div'); d.innerHTML = '<div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:6px">REFERENCES ▶</div>'; for (const e of outE) { const c = document.createElement('div'); c.className = 'rel-card'; c.innerHTML = `<div class="rl">${escH(e.fromCols.join(','))} → ${escH(e.toTable)}</div><div class="rm2">${e.constraintName ? escH(e.constraintName) : ''}${e.onDelete ? ` · ON DELETE ${e.onDelete}` : ''}</div>`; d.appendChild(c); } rg.appendChild(d); }
      if (inE.length)  { const d = document.createElement('div'); d.innerHTML = '<div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:6px">◀ REFERENCED BY</div>'; for (const e of inE) { const c = document.createElement('div'); c.className = 'rel-card in'; c.innerHTML = `<div class="rl">${escH(e.fromTable)}</div><div class="rm2">${escH(e.fromCols.join(','))} → ${escH(e.toCols.join(','))}</div>`; d.appendChild(c); } rg.appendChild(d); }
      detail.appendChild(relSect);
    }

    /* indexes */
    if (t.indexes.length) {
      const idxSect = document.createElement('div'); idxSect.className = 'sect'; idxSect.innerHTML = '<div class="sect-title">Indexes</div>';
      for (const idx of t.indexes) { const row = document.createElement('div'); row.className = 'idx-row'; row.innerHTML = `<span style="color:var(--color-text-primary)">${escH(idx.name)}</span><span style="color:var(--color-text-tertiary)">(${escH(idx.columns.join(', '))})</span>${idx.unique ? '<span class="badge uq">UNIQUE</span>' : ''}<span style="color:var(--color-text-tertiary);font-size:10px;margin-left:auto">V${idx.createdIn}</span>`; idxSect.appendChild(row); }
      detail.appendChild(idxSect);
    }

    /* check constraints */
    if (cks.length) {
      const ckSect = document.createElement('div'); ckSect.className = 'sect'; ckSect.innerHTML = '<div class="sect-title">Check Constraints</div>';
      for (const ck of cks) { const row = document.createElement('div'); row.style.cssText = 'padding:4px 0;font-size:11.5px;border-bottom:0.5px solid var(--color-border-tertiary)'; row.innerHTML = `<span style="color:var(--color-text-secondary)">${ck.name || 'unnamed'}: </span><span style="color:#d97706">CHECK (${escH(ck.checkExpr)})</span>`; ckSect.appendChild(row); }
      detail.appendChild(ckSect);
    }
    main.appendChild(detail);
  } else {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'Select a table to view details'; main.appendChild(nd);
  }
  pane.appendChild(main);
}

/* ═══════════════════════════════════════════════
   RENDER: LLM CHUNKS TAB
═══════════════════════════════════════════════ */
function renderLLM() {
  const pane = document.getElementById('pane-llm'); pane.innerHTML = '';

  /* sidebar */
  const sb = document.createElement('div'); sb.className = 'sidebar';
  const expBtn = document.createElement('button'); expBtn.className = 'export-btn'; expBtn.textContent = '⬇ Export all JSON';
  expBtn.addEventListener('click', () => {
    const json = JSON.stringify(chunks.map(c => ({ id: c.id, type: c.type, title: c.title, content: c.content, metadata: c.meta })), null, 2);
    const blob = new Blob([json], { type: 'application/json' }); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'schema_vector_chunks.json'; a.click(); URL.revokeObjectURL(url);
  });
  sb.appendChild(expBtn);
  const ssect = document.createElement('div'); ssect.className = 'sbar-sect'; ssect.textContent = `Chunks (${chunks.length})`; sb.appendChild(ssect);
  for (const chunk of chunks) {
    const btn = document.createElement('button'); btn.className = 'sbar-item' + (chunk.id === selChunk?.id ? ' active' : '');
    btn.innerHTML = `${escH(chunk.title)}<div class="sub">${chunk.type} · ${chunk.content.length} chars</div>`;
    btn.addEventListener('click', () => { selChunk = chunk; renderLLM(); });
    sb.appendChild(btn);
  }
  pane.appendChild(sb);

  /* main */
  const main = document.createElement('div'); main.className = 'main';
  if (selChunk) {
    const hdr = document.createElement('div'); hdr.className = 'chunk-hdr';
    hdr.innerHTML = `<span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${escH(selChunk.title)}</span><span class="chunk-type-badge">${selChunk.type}</span><button class="copy-btn" id="copy-btn">Copy content</button>`;
    main.appendChild(hdr);
    const inner = document.createElement('div'); inner.style.cssText = 'padding:14px 20px';
    inner.innerHTML = `
      <div class="chunk-hint">💡 ${escH(selChunk.hint)}</div>
      <div class="chunk-content">${escH(selChunk.content)}</div>
      <div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Metadata</div>
      <div class="chunk-meta">${escH(JSON.stringify(selChunk.meta, null, 2))}</div>
    `;
    main.appendChild(inner);
    hdr.querySelector('.copy-btn').addEventListener('click', function () {
      navigator.clipboard.writeText(selChunk.content);
      this.textContent = 'Copied!'; this.className = 'copy-btn ok';
      setTimeout(() => { this.textContent = 'Copy content'; this.className = 'copy-btn'; }, 1800);
    });
  } else {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'Select a chunk to view'; main.appendChild(nd);
  }
  pane.appendChild(main);
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function escH(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  document.getElementById('pane-migrations').style.display = tab === 'migrations' ? '' : 'none';
  document.getElementById('pane-graph').style.display      = tab === 'graph' ? 'flex' : 'none';
  document.getElementById('pane-llm').style.display        = tab === 'llm'   ? 'flex' : 'none';
  if (tab === 'graph') renderGraph();
  if (tab === 'llm')   renderLLM();
}

/* ═══════════════════════════════════════════════
   BOOTSTRAP
═══════════════════════════════════════════════ */
document.getElementById('tabbar').addEventListener('click', e => {
  const btn = e.target.closest('.tab'); if (!btn || btn.classList.contains('disabled')) return;
  showTab(btn.dataset.tab);
});

document.getElementById('parse-btn').addEventListener('click', () => {
  const errBar = document.getElementById('err-bar');
  try {
    graph  = applyMigrations(files);
    chunks = buildChunks(graph);
    selTable = [...graph.tables.keys()][0];
    selChunk = chunks[0];
    document.getElementById('tab-graph').classList.remove('disabled');
    document.getElementById('tab-llm').classList.remove('disabled');
    errBar.style.display = 'none';
    showTab('graph');
  } catch (e) {
    errBar.textContent = '⚠ Parse error: ' + e.message;
    errBar.style.display = '';
    console.error(e);
  }
});

renderMigrations();
</script>
</body>
</html>
