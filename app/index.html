<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schema Graph Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f9fafb;
      --color-bg-tertiary: #f3f4f6;
      --color-text-primary: #111827;
      --color-text-secondary: #4b5563;
      --color-text-tertiary: #9ca3af;
      --color-border-secondary: rgba(0,0,0,0.3);
      --color-border-tertiary: rgba(0,0,0,0.15);
      --font-mono: 'Courier New', Courier, monospace;
      --accent: #7c3aed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #111827;
        --color-bg-secondary: #1f2937;
        --color-bg-tertiary: #0f172a;
        --color-text-primary: #f9fafb;
        --color-text-secondary: #9ca3af;
        --color-text-tertiary: #6b7280;
        --color-border-secondary: rgba(255,255,255,0.3);
        --color-border-tertiary: rgba(255,255,255,0.15);
      }
    }

    body { font-family: var(--font-mono); background: var(--color-bg-tertiary); color: var(--color-text-primary); font-size: 12px; height: 100vh; overflow: hidden; }
    .shell { display: flex; flex-direction: column; height: 100vh; min-height: 600px; }
    .topbar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--color-bg-secondary); border-bottom: 0.5px solid var(--color-border-secondary); flex-shrink: 0; }
    .topbar-title { font-weight: 500; font-size: 13px; }
    .topbar-sub   { font-size: 11px; color: var(--color-text-tertiary); }
    .tabs { display: flex; background: var(--color-bg-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); flex-shrink: 0; }
    .tab { padding: 8px 16px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-text-secondary); border-bottom: 2px solid transparent; transition: all .15s; }
    .tab:hover { color: var(--color-text-primary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.disabled { opacity: .35; cursor: not-allowed; }
    .parse-btn { margin-left: auto; padding: 5px 14px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500; }
    .parse-btn:hover { background: #6d28d9; }
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .panel { flex: 1; overflow: auto; padding: 12px; }
    .split { flex: 1; display: flex; overflow: hidden; }
    .sidebar { width: 200px; flex-shrink: 0; border-right: 0.5px solid var(--color-border-tertiary); overflow-y: auto; padding: 8px 0; background: var(--color-bg-secondary); }
    .sbar-sect { font-size: 10px; color: var(--color-text-tertiary); padding: 10px 12px 4px; text-transform: uppercase; letter-spacing: .08em; }
    .sbar-item { display: block; width: 100%; text-align: left; padding: 6px 12px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-text-secondary); border-left: 2px solid transparent; }
    .sbar-item:hover { color: var(--color-text-primary); background: var(--color-bg-primary); }
    .sbar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,58,237,.06); }
    .sbar-item .sub { font-size: 10px; color: var(--color-text-tertiary); margin-top: 1px; }
    .file-block { margin-bottom: 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; overflow: hidden; }
    .file-hdr { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--color-bg-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
    .file-hdr input { flex: 1; background: none; border: none; outline: none; font-family: inherit; font-size: 12px; color: var(--color-text-primary); }
    .file-hdr .rm { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; line-height: 1; padding: 0 2px; }
    .sql-area { width: 100%; border: none; outline: none; font-family: inherit; font-size: 11.5px; background: #0d1117; color: #a5f3fc; padding: 10px; resize: vertical; min-height: 120px; line-height: 1.6; }
    .add-btn { padding: 6px 14px; background: none; border: 1px dashed var(--color-border-secondary); border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--accent); }
    .err-bar { padding: 6px 14px; background: rgba(220,38,38,.08); border-bottom: 0.5px solid rgba(220,38,38,.3); color: #dc2626; font-size: 11px; }
    .main { flex: 1; overflow: auto; }
    .tbl-hdr { padding: 16px 20px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .tbl-name { font-size: 16px; font-weight: 500; }
    .tbl-meta { font-size: 11px; color: var(--color-text-tertiary); margin-top: 3px; }
    .tbl-comment { font-size: 12px; color: var(--color-text-secondary); font-style: italic; margin-top: 4px; }
    .sect { padding: 12px 20px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .sect-title { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .col-row { display: grid; grid-template-columns: 140px 120px auto 100px 1fr; gap: 6px; padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: center; font-size: 11.5px; }
    .col-row:last-child { border-bottom: none; }
    .col-head { color: var(--color-text-tertiary); font-size: 10px; padding-bottom: 4px; }
    .col-type { color: #7dd3fc; }
    .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-right: 3px; }
    .badge.pk { background: rgba(124,58,237,.15); color: #7c3aed; border: 0.5px solid rgba(124,58,237,.3); }
    .badge.nn { background: rgba(220,38,38,.10); color: #dc2626; border: 0.5px solid rgba(220,38,38,.25); }
    .badge.uq { background: rgba(8,145,178,.10); color: #0891b2; border: 0.5px solid rgba(8,145,178,.25); }
    .badge.fk { background: rgba(217,119,6,.10); color: #d97706; border: 0.5px solid rgba(217,119,6,.25); }
    .col-def { color: var(--color-text-tertiary); }
    .col-comment { color: var(--color-text-tertiary); font-style: italic; }
    .rel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rel-card { background: var(--color-bg-secondary); border-radius: 6px; padding: 10px 12px; border-left: 3px solid #d97706; }
    .rel-card.in { border-left-color: #0891b2; }
    .rel-card .rl  { font-size: 11.5px; }
    .rel-card .rm2 { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
    .idx-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11.5px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .idx-row:last-child { border-bottom: none; }
    .chunk-content { background: #0d1117; border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; padding: 14px; color: #a5f3fc; white-space: pre-wrap; font-size: 11px; line-height: 1.7; margin-bottom: 12px; }
    .chunk-meta { background: var(--color-bg-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; padding: 14px; color: var(--color-text-secondary); white-space: pre-wrap; font-size: 11px; line-height: 1.6; }
    .chunk-hint { font-size: 11px; color: var(--color-text-tertiary); font-style: italic; margin-bottom: 10px; padding: 6px 10px; background: var(--color-bg-secondary); border-radius: 4px; border-left: 2px solid var(--accent); }
    .chunk-hdr { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .chunk-type-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(124,58,237,.12); color: var(--accent); border: 0.5px solid rgba(124,58,237,.3); }
    .copy-btn { margin-left: auto; padding: 4px 10px; background: var(--color-bg-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 4px; cursor: pointer; font-size: 11px; color: var(--color-text-secondary); font-family: inherit; }
    .copy-btn:hover { color: var(--color-text-primary); }
    .copy-btn.ok { color: #059669; }
    .erd-wrap { width: 100%; overflow: hidden; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-bg-secondary); }
    .erd-wrap svg { display: block; width: 100%; }
    .export-btn { margin: 12px; padding: 6px 14px; background: none; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-text-secondary); }
    .export-btn:hover { color: var(--color-text-primary); }
    .no-data { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--color-text-tertiary); font-size: 12px; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="8" stroke="#7c3aed" stroke-width="1.2"/>
      <circle cx="9" cy="9" r="4" fill="#7c3aed" opacity=".4"/>
      <circle cx="9" cy="9" r="1.5" fill="#7c3aed"/>
    </svg>
    <span class="topbar-title">Schema Graph Engine</span>
    <span class="topbar-sub">Flyway → AST → Vector Context</span>
  </div>
  <div class="tabs" id="tabbar">
    <button class="tab active"  data-tab="migrations">① Migrations</button>
    <button class="tab disabled" data-tab="graph" id="tab-graph">② Schema Graph</button>
    <button class="tab disabled" data-tab="llm"   id="tab-llm">③ LLM Chunks</button>
    <button class="parse-btn" id="parse-btn">▶ Parse →</button>
  </div>
  <div id="err-bar" style="display:none" class="err-bar"></div>
  <div class="content">
    <div id="pane-migrations" class="panel"></div>
    <div id="pane-graph"      class="split" style="display:none"></div>
    <div id="pane-llm"        class="split" style="display:none"></div>
  </div>
</div>

<!-- All logic comes from the shared core module -->
<script type="module" src="./app.js"></script>
</body>
</html>
